<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Format Text</title>
</head>
<body>
    <p>This is a normal text</p>
    <p>This is a <b>bold</b> text</p>
    <p>This is a <i>italicised</i> text</p>
    <p>This is a <u>underlined</u> text</p>
    <p>This is a <delete>deleted</delete> text</p>
    <p>This is a <big>big</big> text</p>
    <p>This is a <small>small</small> text</p>
    <p>This is a <sup>Superscript</sup> text</p>
    <p>This is a <sub>subscript</sub> text</p>
    <p>This is a <tt>monospaced</tt> text</p>
    <p>This is a <mark style="background-color: rgb(226, 147, 214);"></mark> text</p>
    
</body>
</html>
