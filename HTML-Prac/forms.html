<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form action="index.php" method="post" enctype="multipart/form-data"></form>
    <label for="username">Username:</label>
    <input type="text" placeholder="Enter name" id="username">
    <br>
    <label for="password">Password:</label>
    <input type="password" placeholder="Enter password" minlength="8" id="password">
    <br>
    <label for="email">Email:</label>
    <input type="email" placeholder="Enter your email" id="email">
    <br>
    <label for="phone">Phone No:</label>
    <input type="tel" placeholder="Enter your phone no" maxlength="10" id="phone">
    <br>
    <label for="birthday">Birth date:</label>
    <input type="date" placeholder="Enter your birth date" id="birthday">
    <br>
    <label for="title">Title:</label>
    <label for="Ms">Ms</label>
    <input type="radio" id="Ms" value="Ms" name="title">
     <label for="Mr">Mr</label>
    <input type="radio" id="Mr" value="Mr" name="title">
    <br>
    <label for="country">Country:</label>
    <select id="country">
        <option value="India">India</option>
        <option value="US">US</option>
        <option value="UK">UK</option>
    </select>
    <br>
    <label for="subscribe">Subscribe:</label>
    <input type="checkbox" id="subscribe">
    <br>
    <br>
    <label for="feedback">Feedback:</label>
    <textarea id="feedback" rows="2" cols="10"></textarea>
    <br>
    <br>
    <label for="file">File:</label>
    <input type="file" id="file" placeholder="Upload file" >
    <br>
    <br>
    <button type="submit">Submit</button>

    
</body>
</html>
