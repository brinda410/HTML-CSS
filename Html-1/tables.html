<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <h2>Store Hours</h2>
    <table border="3" style="background-color: black;">
        <tr align="center" style="background-color: bisque;">
            <th width="100">Sunday</th>
            <th width="100">Monday</th>
            <th width="100">Tuesday</th>
            <th width="100">Wednesday</th>
            <th width="100">Thursday</th>
            <th width="100">Friday</th>
            <th width="100">Saturday</th>
        </tr>
        <tr align="center" style="background-color: bisque;">
        <td width="100">Closed</td>
        <td width="100">9-5</td>
        <td width="100">9-5</td>
        <td width="100">9-5</td>
        <td width="100">9-5</td>
        <td width="100">9-5</td>
        <td width="100">9-5</td>
        </tr>
    </table>
    
</body>
</html>
